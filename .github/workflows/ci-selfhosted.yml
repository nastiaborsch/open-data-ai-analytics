name: CI (self-hosted)

on:
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: "1"
  PYTHONIOENCODING: "utf-8"

jobs:
  run-data-quality-local:
    runs-on: [self-hosted, windows, x64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check local Python
        shell: powershell
        run: |
          python --version
          pip --version

      - name: Show workspace structure
        shell: powershell
        run: |
          Write-Host "Workspace: $pwd"
          Get-ChildItem .
          if (Test-Path data) { Get-ChildItem data -Recurse }
          if (Test-Path src) { Get-ChildItem src -Recurse }

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Create artifact directory
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/data_quality_analysis | Out-Null

      - name: Run module on self-hosted runner
        shell: powershell
        run: |
          python src/data_quality_analysis.py

      - name: Save reports snapshot
        if: always()
        shell: powershell
        run: |
          if (Test-Path reports) {
            Copy-Item reports -Destination artifacts/data_quality_analysis/reports -Recurse -Force
          }
          if (Test-Path data/raw) {
            New-Item -ItemType Directory -Force -Path artifacts/data_quality_analysis/data_raw_snapshot | Out-Null
            Get-ChildItem data/raw | Out-File artifacts/data_quality_analysis/data_raw_snapshot/files.txt
          }

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-data_quality_analysis-selfhosted
          path: artifacts/data_quality_analysis