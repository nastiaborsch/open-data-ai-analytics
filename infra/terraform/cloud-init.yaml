#cloud-config
package_update: true

packages:
  - ca-certificates
  - curl
  - gnupg
  - git

write_files:
  - path: /usr/local/bin/deploy-open-data-app.sh
    permissions: "0755"
    content: |
      #!/bin/bash
      set -euxo pipefail

      install -m 0755 -d /etc/apt/keyrings
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
      chmod a+r /etc/apt/keyrings/docker.asc

      . /etc/os-release
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $VERSION_CODENAME stable" > /etc/apt/sources.list.d/docker.list

      apt-get update
      apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

      systemctl enable docker
      systemctl start docker

      rm -rf /opt/open-data-ai-analytics
      git clone "${repo_url}" /opt/open-data-ai-analytics

      cd /opt/open-data-ai-analytics

      cat > .env <<'ENVEOF'
      POSTGRES_DB=measurements_db
      POSTGRES_USER=postgres
      POSTGRES_PASSWORD=postgres
      DB_HOST=db
      DB_PORT=5432
      WEB_PORT=5000
      ENVEOF

      mkdir -p data reports reports/figures

      if [ ! -f data/measurements_sample.csv ] && [ -f data/raw/measurements_sample.csv ]; then
        cp data/raw/measurements_sample.csv data/measurements_sample.csv
      fi

      docker compose -f compose.yaml -f monitoring/docker-compose.monitoring.yml up -d --build
      docker compose -f compose.yaml -f monitoring/docker-compose.monitoring.yml ps > reports/docker_ps.txt

            curl -sfL https://get.k3s.io | sh -

      export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

      mkdir -p /home/azureuser/.kube
      cp /etc/rancher/k3s/k3s.yaml /home/azureuser/.kube/config
      chown -R azureuser:azureuser /home/azureuser/.kube
      chmod 600 /home/azureuser/.kube/config

      kubectl get nodes

      kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
      kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml

      kubectl wait --for=condition=established --timeout=180s crd/applications.argoproj.io

      kubectl patch svc argocd-server -n argocd -p '{"spec": {"type": "NodePort", "ports": [{"name": "http", "port": 80, "targetPort": 8080, "nodePort": 30090}, {"name": "https", "port": 443, "targetPort": 8080, "nodePort": 30443}]}}'

      kubectl apply -f /opt/open-data-ai-analytics/gitops/argocd/application.yaml

runcmd:
  - /usr/local/bin/deploy-open-data-app.sh